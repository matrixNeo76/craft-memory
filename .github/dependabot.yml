# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    # Group non-breaking dependency updates into single PRs
    groups:
      test-dependencies:
        patterns:
          - "pytest*"
        update-types:
          - "minor"
          - "patch"
      lint-dependencies:
        patterns:
          - "ruff"
          - "mypy"
        update-types:
          - "minor"
          - "patch"
